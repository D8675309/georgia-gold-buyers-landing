<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Georgia Gold Buyers">
  <!-- Dark rounded-square tile matching site header (#1a1a1a) -->
  <rect width="64" height="64" rx="12" fill="#1a1a1a"/>

  <!-- Gold diamond mark -->
  <g transform="translate(32 18)">
    <!-- top facet -->
    <path d="M0 -10 L-8 -2 L8 -2 Z" fill="#d4a93a"/>
    <!-- bottom facet -->
    <path d="M0 10 L-9 -2 L9 -2 Z" fill="#c5961a"/>
    <!-- highlight -->
    <path d="M0 -10 L-4 -2 L0 4 L4 -2 Z" fill="#e8c356" opacity="0.9"/>
  </g>

  <!-- GGB wordmark -->
  <text x="32" y="52"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="20"
        letter-spacing="0.5"
        text-anchor="middle"
        fill="#d4a93a">GGB</text>
</svg>
